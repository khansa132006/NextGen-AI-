<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tebak Gambar – Next Gen AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/game-tebak.css"/>
</head>
<body>
<div class="scene">

  <button class="back-top" onclick="window.location.href='game.html'">
    <span class="arrow">←</span> Pilih Game
  </button>

  <div class="page-header">
    <span class="page-icon">🖼️</span>
    <span class="page-title">Tebak Gambar</span>
  </div>

  <div class="progress-info">
    <span id="nomorSoal">Soal 1</span>&nbsp;dari&nbsp;<span id="totalSoal">5</span>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span class="skor-label">Skor: <span id="skor">0</span></span>
  </div>

  <div class="soal-card" id="soalCard">
    <div class="gambar-box" id="gambarBox"></div>
    <p class="pertanyaan" id="pertanyaan"></p>
    <div class="pilihan-grid" id="pilihanGrid"></div>
  </div>

  <div class="notif" id="notif"></div>

  <!-- HASIL OVERLAY — menggantikan alert() -->
  <div class="hasil-overlay" id="hasilOverlay">
    <div class="hasil-card">
      <div class="hasil-trophy" id="hasilTrophy">🏆</div>
      <div class="hasil-judul">Game Selesai!</div>
      <div class="hasil-skor" id="hasilSkor">0 / 5</div>
      <div class="hasil-sub" id="hasilSub">Kamu hebat! Terus belajar ya.</div>
      <div class="hasil-btns">
        <button class="btn-ulang" onclick="ulangGame()">🔄 Ulangi</button>
        <button class="btn-menu" onclick="window.location.href='game.html'">🎮 Menu Game</button>
      </div>
    </div>
  </div>

</div>
<script src="js/game-tebak.js"></script>
</body>
</html>
